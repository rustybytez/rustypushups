version: "2"
sql:
  - engine: "sqlite"
    queries: "sql/queries/queries.sql"
    schema: "sql/schema/schema.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: false
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
