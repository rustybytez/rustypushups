services:
  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATABASE_URL=${DATABASE_URL:-/data/rustypushups.db}
      - PORT=${PORT:-8080}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - db_data:/data
    user: appuser
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  db_data:
