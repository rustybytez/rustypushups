<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RustyPushups">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <title>RustyPushups</title>
  <style>
    h2, hgroup { position: sticky; top: 0; background: var(--pico-background-color); padding-bottom: 0.5rem; z-index: 10; }
    #today hgroup { text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <ul>
        <li><strong>&#x1F4AA; RustyPushups</strong></li>
      </ul>
      <ul>
        <li><a href="/">Today</a></li>
        <li><a href="/history">Month</a></li>
        {{if .User}}<li><a href="/users">Settings</a></li>{{end}}
      </ul>
    </nav>
    {{template "content" .}}
  </div>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script>
    function updateNav() {
      var today = new Date().toLocaleDateString('en-CA');
      var container = document.getElementById('today');
      if (!container) return;
      var pageDate = container.dataset.date;
      var nextLink = document.getElementById('next-day-link');
      if (nextLink && pageDate >= today) nextLink.style.display = 'none';
    }
    updateNav();
    document.addEventListener('htmx:afterSettle', updateNav);
  </script>
</body>
</html>
